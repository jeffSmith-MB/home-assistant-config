  - sensor:
      - name: "Furnace Filter Days Remaining"
        unique_id: furnace_filter_days_remaining
        unit_of_measurement: "days"
        state: >
          {% set last = states('input_datetime.furnace_filter_last_changed') %}
          {% if last not in ['unknown','unavailable','none',''] %}
            {% set last_date = as_datetime(last).date() %}
            {% set next_due = last_date + timedelta(days=90) %}
            {% set remaining = next_due - now().date() %}
            {{ [remaining.days, -30] | max }}
          {% else %}
            unavailable
          {% endif %}

      - name: "Furnace Filter Days Raw"
        unique_id: furnace_filter_days_raw
        state: >
          {% set last = states('input_datetime.furnace_filter_last_changed') %}
          {% if last not in ['unknown','unavailable','none',''] %}
            {% set last_date = as_datetime(last).date() %}
            {% set next_due = last_date + timedelta(days=90) %}
            {{ (next_due - now().date()).days }}
          {% else %}
            unavailable
          {% endif %}

      - name: "Furnace Filter Debug Raw"
        unique_id: furnace_filter_debug_raw
        state: "{{ states('input_datetime.furnace_filter_last_changed') }}"

      - name: "Furnace Filter Debug Date"
        unique_id: furnace_filter_debug_date
        state: >
          {% set last = states('input_datetime.furnace_filter_last_changed') %}
          {% if last not in ['unknown','unavailable','none',''] %}
            {{ as_datetime(last).date() }}
          {% else %}
            unavailable
          {% endif %}

      - name: "Furnace Template Test Sensor"
        unique_id: template_test_sensor
        state: "Template file loaded OK"

      - name: "Today Friendly"
        unique_id: today_friendly
        state: "{{ now().strftime('%A, %B %-d') }}"

#      - name: "Treadmill Utilization"
#        unique_id: treadmill_utilization
