  - binary_sensor:
      - name: "Gym Occupied"
        unique_id: gym_occupied
        device_class: occupancy
        state: >
          {{ is_state('binary_sensor.hue_motion_sensor_3_motion', 'on') }}
        delay_off:
          minutes: 3

      - name: "Theatre Lights Available"
        unique_id: theatre_lights_available
        state: >
          {% set lights = [
            'light.ceiling_light',
            'light.hall_light',
            'light.wall_light'
          ] %}
          {{ lights | select('is_state', 'unavailable') | list | count == 0 }}

      - name: "Master Bedroom Lights Available"
        unique_id: master_bedroom_lights_available
        state: >
          {% set lights = [
            'light.bedroom1',
            'light.bedroom2',
            'light.bedroom3'
          ] %}
          {{ lights | select('is_state', 'unavailable') | list | count == 0 }}

